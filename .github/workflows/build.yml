name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade buildozer cython virtualenv

    - name: Initialize Buildozer
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,pyjnius,android,python-socketio,websocket-client/' buildozer.spec
        sed -i 's/# android.permissions/android.permissions/' buildozer.spec

    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1 | tee build.log || true
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
        if-no-files-found: ignore
        
    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
