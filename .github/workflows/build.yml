name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer kivy

    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
        from kivy.app import App
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.label import Label
        from kivy.uix.textinput import TextInput
        from kivy.uix.button import Button
        from kivy.clock import Clock
        from kivy.utils import platform
        import threading
        import socket
        import datetime

        if platform == 'android':
            from jnius import autoclass
            from android.permissions import request_permissions, Permission
            Intent = autoclass('android.content.Intent')
            Uri = autoclass('android.net.Uri')
            PythonActivity = autoclass('org.kivy.android.PythonActivity')
            Context = autoclass('android.content.Context')

        class PhoneControllerApp(App):
            def __init__(self, **kwargs):
                super().__init__(**kwargs)
                self.connected = False

            def build(self):
                if platform == 'android':
                    request_permissions([Permission.INTERNET, Permission.CAMERA])

                layout = BoxLayout(orientation='vertical', padding=15, spacing=10)
                
                layout.add_widget(Label(
                    text='Phone Controller',
                    font_size='28sp',
                    size_hint_y=0.12
                ))
                
                self.status = Label(
                    text='Status: Disconnected',
                    font_size='18sp',
                    size_hint_y=0.08
                )
                layout.add_widget(self.status)
                
                layout.add_widget(Label(text='Server URL:', size_hint_y=0.05))
                
                self.url_input = TextInput(
                    text='http://192.168.1.100:5000',
                    multiline=False,
                    size_hint_y=0.1
                )
                layout.add_widget(self.url_input)
                
                self.btn = Button(text='Connect', size_hint_y=0.1)
                self.btn.bind(on_press=self.toggle_connect)
                layout.add_widget(self.btn)
                
                layout.add_widget(Label(text='Log:', size_hint_y=0.05))
                
                self.log = TextInput(
                    text='App Ready...\n',
                    multiline=True,
                    readonly=True,
                    size_hint_y=0.5
                )
                layout.add_widget(self.log)
                
                return layout

            def toggle_connect(self, instance):
                if self.connected:
                    self.disconnect()
                else:
                    self.connect()

            def connect(self):
                url = self.url_input.text
                self.add_log(f'Connecting to {url}...')
                threading.Thread(target=lambda: self._try_connect(url), daemon=True).start()

            def _try_connect(self, url):
                try:
                    clean_url = url.replace('http://','').replace('https://','')
                    if ':' in clean_url:
                        host = clean_url.split(':')[0]
                        port = int(clean_url.split(':')[1].split('/')[0])
                    else:
                        host = clean_url.split('/')[0]
                        port = 80
                    
                    sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    sock.settimeout(5)
                    sock.connect((host, port))
                    sock.close()
                    Clock.schedule_once(lambda dt: self.on_connected())
                except Exception as e:
                    Clock.schedule_once(lambda dt: self.add_log(f'Error: {e}'))

            def disconnect(self):
                self.connected = False
                self.status.text = 'Status: Disconnected'
                self.btn.text = 'Connect'
                self.add_log('Disconnected')

            def on_connected(self):
                self.connected = True
                self.status.text = 'Status: Connected'
                self.btn.text = 'Disconnect'
                self.add_log('Connected successfully!')

            def add_log(self, msg):
                time_str = datetime.datetime.now().strftime('%H:%M:%S')
                self.log.text = f'[{time_str}] {msg}\n' + self.log.text

        if __name__ == '__main__':
            PhoneControllerApp().run()
        EOF

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = PhoneController
        package.name = phonecontroller
        package.domain = org.test
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.api = 31
        android.minapi = 21
        android.archs = arm64-v8a
        orientation = portrait
        fullscreen = 0
        
        [buildozer]
        log_level = 2
        warn_on_root = 0
        EOF

    - name: Build APK
      run: |
        export PATH=$PATH:$HOME/.local/bin
        yes | buildozer -v android debug 2>&1 | tee build.log || true

    - name: Find and List APK
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" 2>/dev/null
        echo "=== Bin directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phone-controller-apk
        path: bin/*.apk
        if-no-files-found: warn

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
