name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          libffi-dev libssl-dev \
          cmake
        pip install --upgrade pip wheel setuptools
        pip install cython==0.29.36
        pip install buildozer

    - name: Create Simple App
      run: |
        cat > main.py << 'ENDOFFILE'
        from kivy.app import App
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.label import Label
        from kivy.uix.textinput import TextInput
        from kivy.uix.button import Button
        from kivy.clock import Clock
        from kivy.utils import platform
        import threading
        
        class PhoneControllerApp(App):
            def build(self):
                self.layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
                
                self.layout.add_widget(Label(
                    text='[b]Phone Controller[/b]',
                    markup=True,
                    font_size='28sp',
                    size_hint_y=0.15
                ))
                
                self.status = Label(text='Status: Ready', font_size='16sp', size_hint_y=0.1)
                self.layout.add_widget(self.status)
                
                self.layout.add_widget(Label(text='Server URL:', size_hint_y=0.08))
                self.url_input = TextInput(
                    text='http://192.168.1.100:5000',
                    multiline=False,
                    size_hint_y=0.12
                )
                self.layout.add_widget(self.url_input)
                
                self.connect_btn = Button(text='Connect', size_hint_y=0.12)
                self.connect_btn.bind(on_press=self.on_connect)
                self.layout.add_widget(self.connect_btn)
                
                self.log = TextInput(
                    text='App started...\n',
                    multiline=True,
                    readonly=True,
                    size_hint_y=0.43
                )
                self.layout.add_widget(self.log)
                
                return self.layout
            
            def on_connect(self, instance):
                url = self.url_input.text
                self.log.text += f'Connecting to {url}...\n'
                self.status.text = 'Status: Connecting...'
                
                # Start connection in background
                threading.Thread(target=self.connect_to_server, daemon=True).start()
            
            def connect_to_server(self):
                try:
                    import socket
                    # Test basic connectivity
                    url = self.url_input.text.replace('http://', '').replace('https://', '')
                    host = url.split(':')[0]
                    port = int(url.split(':')[1].split('/')[0]) if ':' in url else 80
                    
                    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    s.settimeout(5)
                    s.connect((host, port))
                    s.close()
                    
                    Clock.schedule_once(lambda dt: self.update_status('Connected!'))
                except Exception as e:
                    Clock.schedule_once(lambda dt: self.update_status(f'Error: {e}'))
            
            def update_status(self, msg):
                self.status.text = f'Status: {msg}'
                self.log.text += f'{msg}\n'
        
        if __name__ == '__main__':
            PhoneControllerApp().run()
        ENDOFFILE

    - name: Create Buildozer Spec
      run: |
        cat > buildozer.spec << 'ENDOFFILE'
        [app]
        title = PhoneController
        package.name = phonecontroller
        package.domain = org.test
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.api = 31
        android.minapi = 21
        android.archs = arm64-v8a
        orientation = portrait
        fullscreen = 0
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        ENDOFFILE

    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer -v android debug 2>&1 | tee build.log

    - name: Find APK
      run: |
        echo "=== Looking for APK ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la bin/ 2>/dev/null || echo "No bin folder"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phone-controller-apk
        path: |
          bin/*.apk
          .buildozer/android/platform/build-*/dists/*/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload Build Log  
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
